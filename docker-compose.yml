version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
      POSTGRES_DB: gym_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
